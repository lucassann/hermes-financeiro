<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES.FINANCE | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen font-sans">

    <!-- Header Fixo -->
    <header class="border-b border-white/10 p-6 flex justify-between items-center bg-[#0a0a0a]/80 backdrop-blur-md sticky top-0">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-yellow-500">HERMES<span class="text-white">.FINANCE</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Painel de Controle v3.0</p>
        </div>
        <button onclick="document.getElementById('modal').showModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-3 rounded-2xl shadow-lg transition-all active:scale-95">NOVO LANÇAMENTO</button>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Cards de Métricas -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-neutral-900 p-8 rounded-3xl border border-white/5 shadow-2xl">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">Total Consumido</p>
                <h2 id="total" class="text-5xl font-black text-white">R$ 0,00</h2>
            </div>
            <div class="bg-neutral-900 p-8 rounded-3xl border border-white/5 flex flex-col justify-center">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">Transações Totais</p>
                <h2 id="count" class="text-5xl font-black text-yellow-500">0</h2>
            </div>
        </div>

        <!-- Tabela -->
        <div class="bg-neutral-900 rounded-3xl border border-white/5 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 text-[10px] uppercase tracking-widest">
                    <tr><th class="p-6">Descrição</th><th class="p-6">Categoria</th><th class="p-6">Valor</th><th class="p-6 text-right">Ação</th></tr>
                </thead>
                <tbody id="tabela-corpo" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal Responsivo -->
    <dialog id="modal" class="p-0 bg-transparent backdrop-blur-xl w-full max-w-lg rounded-3xl">
        <div class="bg-neutral-900 p-8 rounded-3xl border border-white/10">
            <h2 class="text-2xl font-black mb-6">NOVO LANÇAMENTO</h2>
            <input id="desc" type="text" placeholder="O que foi comprado?" class="w-full bg-black p-4 rounded-2xl mb-3 border border-white/10 outline-none focus:border-yellow-500">
            <select id="cat" class="w-full bg-black p-4 rounded-2xl mb-3 border border-white/10 outline-none">
                <option>Alimentação</option><option>Moradia</option><option>Lazer</option><option>Transporte</option>
            </select>
            <input id="val" type="number" placeholder="R$ 0,00" class="w-full bg-black p-4 rounded-2xl mb-6 border border-white/10 outline-none focus:border-yellow-500">
            <button onclick="salvar()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black text-lg transition-all hover:bg-yellow-400">REGISTRAR</button>
            <button onclick="document.getElementById('modal').close()" class="w-full mt-3 text-gray-500 font-bold">Voltar</button>
        </div>
    </dialog>

    <script>
        const sb = supabase.createClient('https://yvhxjykrixagfnezsyap.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2aHhqeWtyaXhhZ2ZuZXpzeWFwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTYyNzEyMSwiZXhwIjoyMDk3MjAzMTIxfQ.3ZlP-angQ-hnNgi1vZUHrvjovyUNuTJksGFY6pXo0fM');

        async function carregar() {
            const { data } = await sb.from('gastos').select('*');
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';
            let total = 0;
            
            data.forEach(i => {
                total += i.valor;
                corpo.innerHTML += `
                    <tr>
                        <td class="p-6 font-medium">${i.descricao}</td>
                        <td class="p-6 text-gray-500 text-sm">${i.categoria || 'Geral'}</td>
                        <td class="p-6 font-black text-yellow-500">R$ ${i.valor.toFixed(2)}</td>
                        <td class="p-6 text-right"><button onclick="deletar(${i.id})" class="text-red-500 hover:text-red-400 font-bold">EXCLUIR</button></td>
                    </tr>`;
            });
            document.getElementById('total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('count').innerText = data.length;
        }

        async function salvar() {
            await sb.from('gastos').insert([{ descricao: document.getElementById('desc').value, valor: parseFloat(document.getElementById('val').value), categoria: document.getElementById('cat').value }]);
            location.reload();
        }

        async function deletar(id) {
            await sb.from('gastos').delete().eq('id', id);
            location.reload();
        }
        carregar();
    </script>
</body>
</html>
