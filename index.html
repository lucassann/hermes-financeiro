<!DOCTYPE html>
<html lang="pt-br" data-theme="luxury">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes | Dashboard Elite</title>
    <link href="https://unpkg.com/daisyui@4.12.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-white p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-5xl font-black tracking-tighter">HERMES<span class="text-yellow-500">.</span></h1>
                <p class="text-slate-400">Visão geral do nosso orçamento.</p>
            </div>
            <button onclick="add_modal.showModal()" class="btn btn-warning px-8 font-bold">+ LANÇAR</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-3xl"><p class="opacity-60">Total Gasto</p><h2 id="total" class="text-4xl font-bold mt-2">R$ 0,00</h2></div>
                <div class="glass p-8 rounded-3xl"><p class="opacity-60">Transações</p><h2 id="count" class="text-4xl font-bold mt-2">0</h2></div>
                
                <div class="glass p-8 rounded-3xl md:col-span-2 overflow-x-auto">
                    <table class="table w-full">
                        <thead class="text-slate-500"><tr><th>Descrição</th><th>Valor</th></tr></thead>
                        <tbody id="tabela-corpo"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl flex flex-col items-center">
                <h3 class="mb-6 font-bold uppercase tracking-widest text-sm text-slate-400">Distribuição</h3>
                <canvas id="myChart" width="200" height="200"></canvas>
            </div>
        </div>
    </div>

    <dialog id="add_modal" class="modal">
        <div class="modal-box glass">
            <h3 class="font-bold text-lg mb-4">Novo Lançamento</h3>
            <input id="desc" type="text" placeholder="Descrição" class="input w-full bg-black mb-3">
            <input id="val" type="number" placeholder="Valor" class="input w-full bg-black mb-3">
            <button onclick="salvar()" class="btn btn-warning w-full">CONFIRMAR</button>
        </div>
    </dialog>

    <script>
        const sb = supabase.createClient('https://yvhxjykrixagfnezsyap.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2aHhqeWtyaXhhZ2ZuZXpzeWFwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTYyNzEyMSwiZXhwIjoyMDk3MjAzMTIxfQ.3ZlP-angQ-hnNgi1vZUHrvjovyUNuTJksGFY6pXo0fM');
        let chart;

        async function carregar() {
            const { data } = await sb.from('gastos').select('*');
            let total = 0;
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';
            
            data.forEach(i => {
                total += i.valor;
                corpo.innerHTML += `<tr class="border-white/5"><td>${i.descricao}</td><td class="text-yellow-500 font-bold">R$ ${i.valor.toFixed(2)}</td></tr>`;
            });

            document.getElementById('total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('count').innerText = data.length;

            // Renderizar Gráfico
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(i => i.descricao),
                    datasets: [{ data: data.map(i => i.valor), backgroundColor: ['#eab308', '#3b82f6', '#ef4444', '#10b981'] }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }
        
        async function salvar() {
            await sb.from('gastos').insert([{ descricao: document.getElementById('desc').value, valor: parseFloat(document.getElementById('val').value) }]);
            location.reload();
        }
        carregar();
    </script>
</body>
</html>
